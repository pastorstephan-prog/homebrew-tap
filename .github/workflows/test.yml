name: Test formula

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Audit formula
        run: brew audit --strict Formula/agentlaunch-doctor.rb
      - name: Install from source
        run: brew install --build-from-source ./Formula/agentlaunch-doctor.rb
      - name: Test formula
        run: brew test agentlaunch-doctor
